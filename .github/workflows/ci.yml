name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  # Deterministic key for the TSWAP_TEST_KEY bypass (Debug builds only).
  # Not a secret: it stubs YubiKey hardware calls in tests and has no meaning
  # outside a throwaway test vault.
  TSWAP_TEST_KEY: "0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF"

jobs:
  build-test-publish:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build TokenSwap.slnx

      - name: Unit tests (in-process)
        run: dotnet test TokenSwap.slnx --no-build --filter "Category!=E2E"

      # NativeAOT publish is the tripwire for AOT-incompatible changes
      # (reflection, unsupported patterns) that a plain build won't catch.
      - name: AOT publish
        run: dotnet publish TswapCli/TswapCli.csproj -c Release

      # E2E smoke tests exercise the real binary as a subprocess (run/PTY/installscript).
      # A Debug AOT publish is used so the TSWAP_TEST_KEY bypass (Debug-only) exists in
      # the binary — this is the step that actually tests NativeAOT-compiled behaviour.
      # Verified on Linux; extending to macOS/Windows runners is a follow-up.
      - name: E2E tests (NativeAOT binary)
        if: matrix.os == 'ubuntu-latest'
        timeout-minutes: 15
        run: |
          dotnet publish TswapCli/TswapCli.csproj -c Debug
          # Select exactly one published binary deterministically; fail fast if none.
          BINARY=$(find "$PWD/TswapCli/bin/Debug" -type f -path '*/publish/tswap' -print -quit)
          if [ -z "$BINARY" ]; then
            echo "::error::no published tswap binary found under TswapCli/bin/Debug" >&2
            exit 1
          fi
          TSWAP_E2E_BINARY="$BINARY" \
            dotnet test TswapTests/TswapTests.csproj --no-build --filter "Category=E2E"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: tswap-${{ matrix.os }}
          path: TswapCli/bin/Release/net10.0/*/publish/tswap*
          if-no-files-found: error
